<!-- @dsCard group="Components" name="Tabs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root{ --bg:#0f0f0f; --surface:#1a1a1a; --border:#2a2a2a; --accent:#c8ff00; --muted:#8a8a8a; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  body{ margin:0; padding:2rem; background:var(--bg); font-family:var(--font); }
  .tabs{ display:inline-flex; gap:.5rem; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:.3rem; }
  .tab{ padding:.55rem 1.4rem; border-radius:9px; font-size:.85rem; font-weight:500; border:none; background:transparent; color:var(--muted); cursor:pointer; font-family:inherit; }
  .tab.active{ background:var(--accent); color:#000; }
</style>
</head>
<body>
  <div class="tabs">
    <button class="tab active">Convert</button>
    <button class="tab">My Lifts</button>
    <button class="tab">Workout</button>
  </div>
</body>
</html>
