<!-- @dsCard group="Components" name="Cards & list rows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root{ --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#111; --border:#2a2a2a; --accent:#c8ff00; --text:#f0f0f0; --muted:#8a8a8a; --dim:#555; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  body{ margin:0; padding:2rem; background:var(--bg); font-family:var(--font); color:var(--text); display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; max-width:640px; align-items:start; }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; }
  .card-title{ font-size:.7rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
  .result-label{ font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.3rem; }
  .result-val{ font-size:2.8rem; font-weight:700; color:var(--accent); letter-spacing:-.03em; line-height:1; }
  .result-unit{ font-size:.85rem; color:var(--muted); margin-top:.2rem; }
  .stack{ display:flex; flex-direction:column; gap:.6rem; }
  .list-row{ background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.85rem 1rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
  .lr-name{ font-size:.95rem; font-weight:500; }
  .lr-mult{ font-size:.85rem; color:var(--accent); font-weight:600; }
  .lr-count{ font-size:.72rem; color:var(--dim); }
</style>
</head>
<body>
  <div class="card">
    <div class="card-title">Convert weight</div>
    <div class="result-label">Free weight equivalent</div>
    <div class="result-val">78</div>
    <div class="result-unit">lbs</div>
  </div>
  <div class="card">
    <div class="card-title">Your exercises</div>
    <div class="stack">
      <div class="list-row"><span class="lr-name">Chest Press</span><span class="lr-mult">&times;1.30</span><span class="lr-count">2 data points</span></div>
      <div class="list-row"><span class="lr-name">Bench Press</span><span class="lr-mult">&times;1.28</span><span class="lr-count">1 data point</span></div>
    </div>
  </div>
</body>
</html>
