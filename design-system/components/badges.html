<!-- @dsCard group="Components" name="Badges & sync status" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root{ --bg:#0f0f0f; --border:#2a2a2a; --accent:#c8ff00; --muted:#8a8a8a; --dim:#555; --warn:#f5b301; --danger:#ff4444; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  body{ margin:0; padding:2rem; background:var(--bg); font-family:var(--font); display:flex; flex-direction:column; gap:1.25rem; }
  .row{ display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; }
  .badge{ display:inline-block; background:#1e1e1e; border:1px solid var(--border); border-radius:6px; padding:.25rem .55rem; font-size:.72rem; color:#9a9a9a; }
  .badge.mode{ color:var(--accent); border-color:#34401a; }
  .badge.saved{ background:#14231a; border-color:#245a2f; color:var(--accent); font-weight:600; }
  .status{ display:inline-flex; align-items:center; gap:.4rem; font-size:.8rem; color:var(--muted); }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--dim); }
  .dot.synced{ background:var(--accent); box-shadow:0 0 7px var(--accent); }
  .dot.saving{ background:var(--warn); box-shadow:0 0 6px var(--warn); }
  .dot.error{ background:var(--danger); box-shadow:0 0 6px var(--danger); }
</style>
</head>
<body>
  <div class="row">
    <span class="badge mode">eccentric</span>
    <span class="badge">heavy load</span>
    <span class="badge">controlled</span>
    <span class="badge">Handles</span>
    <span class="badge saved">&#10003; Saved</span>
  </div>
  <div class="row" style="gap:1.5rem">
    <span class="status"><span class="dot synced"></span>Synced</span>
    <span class="status"><span class="dot saving"></span>Saving&hellip;</span>
    <span class="status"><span class="dot error"></span>Sync error</span>
    <span class="status"><span class="dot"></span>Offline</span>
  </div>
</body>
</html>
