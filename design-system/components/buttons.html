<!-- @dsCard group="Components" name="Buttons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root{ --bg:#0f0f0f; --border:#2a2a2a; --accent:#c8ff00; --text:#f0f0f0; --muted:#8a8a8a; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  body{ margin:0; padding:2rem; background:var(--bg); font-family:var(--font); display:flex; gap:.75rem; flex-wrap:wrap; align-items:center; }
  .btn{ padding:.7rem 1.4rem; border-radius:10px; border:none; font-size:.9rem; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-primary{ background:var(--accent); color:#000; }
  .btn-ghost{ background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-sm{ padding:.4rem .8rem; font-size:.78rem; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
</style>
</head>
<body>
  <button class="btn btn-primary">Save workout</button>
  <button class="btn btn-ghost">Copy for Tonal</button>
  <button class="btn btn-ghost btn-sm">Show / hide</button>
  <button class="btn btn-primary" disabled>Disabled</button>
</body>
</html>
