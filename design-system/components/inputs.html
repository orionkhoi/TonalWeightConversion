<!-- @dsCard group="Components" name="Inputs & selects" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root{ --bg:#0f0f0f; --surface2:#111; --border:#2a2a2a; --accent:#c8ff00; --text:#f0f0f0; --muted:#8a8a8a; --dim:#555; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  body{ margin:0; padding:2rem; background:var(--bg); font-family:var(--font); color:var(--text); display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; max-width:620px; }
  label{ display:block; font-size:.75rem; color:var(--muted); margin-bottom:.35rem; letter-spacing:.05em; text-transform:uppercase; }
  .field{ margin-bottom:1rem; } .field:last-child{ margin-bottom:0; }
  input,select{ width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:1rem; padding:.65rem .9rem; outline:none; font-family:inherit; box-sizing:border-box; }
  input:focus,select:focus{ border-color:var(--accent); }
  input::placeholder{ color:var(--dim); }
</style>
</head>
<body>
  <div>
    <div class="field"><label>Exercise name</label><input type="text" placeholder="e.g. Upright Row" /></div>
    <div class="field"><label>Tonal weight (lbs)</label><input type="number" placeholder="e.g. 80" /></div>
  </div>
  <div>
    <div class="field"><label>Direction</label><select><option>Tonal &rarr; Free weight</option><option>Free weight &rarr; Tonal</option></select></div>
    <div class="field"><label>Focused state</label><input type="text" value="Bench Press" style="border-color:#c8ff00" /></div>
  </div>
</body>
</html>
